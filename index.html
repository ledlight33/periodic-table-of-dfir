<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE PERIODIC TABLE OF DFIR</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    

        <header>
            <h1>The Periodic Table of <span class="accent">DFIR</span></h1>
            <p class="subtitle">The Definitive Reference for Digital Forensics & Incident Response Tools</p>
            <p class="stats-badge">118 Tools | 8 Categories | 69 Open Source</p>
            <p class="version">v1.1</p>
        </header>

        <div class="controls">
            <input type="text" id="search" placeholder="Search by name, symbol, or category..." autocomplete="off" spellcheck="false">
            <div class="filter-buttons" id="filters"></div>
        </div>

        <div class="table-wrapper">
            <div class="periodic-table" id="table"></div>
        </div>

        <div class="legend" id="legend"></div>

        <footer>
            <div class="footer-content">
                <div class="footer-left">
                    <a href="print.html" target="_blank" class="print-btn-magenta">
                        🖨️ CLICK FOR PRINTABLE VERSION
                    </a>
                </div>
                <div class="footer-right">
                    <div class="footer-info-group">
                        <div class="footer-text">
                            <p class="footer-author">Created by <strong>Marino Bekios</strong></p>
                            <p class="footer-link">
                                <a href="https://linkedin.com/in/marbekios" target="_blank">linkedin.com/in/marbekios</a>
                            </p>
                        </div>
                        <img src="assets/qr-linkedin.png" class="footer-qr-static-index" style="width: 80px; height: 80px;" alt="LinkedIn QR">
                    </div>
                </div>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
